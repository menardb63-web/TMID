<!DOCTYPE html>
<html>
<head>
    <title>Lens Style Project</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #viewer {
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #viewer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #header {
            position: absolute;
            top: 20px;
            left: 30px;
            z-index: 10;
        }

        #header h1 {
            margin: 0;
            font-size: 24px;
        }

        #header p {
            margin: 5px 0;
            font-size: 14px;
            color: #aaa;
        }

        #thumbnails {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            overflow-x: auto;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            gap: 10px;
        }

        #thumbnails img {
            height: 80px;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        #thumbnails img:hover {
            opacity: 1;
        }

        .nav {
            position: absolute;
            top: 50%;
            font-size: 40px;
            cursor: pointer;
            padding: 10px;
            user-select: none;
        }

        #prev { left: 10px; }
        #next { right: 10px; }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div id="header">
        <h1>AI Website Project</h1>
        <p>By Brian Menard</p>
    </div>

    <!-- MAIN IMAGE -->
    <div id="viewer">
        <img id="mainImage" src="https://picsum.photos/1200/800?1">
    </div>

    <!-- NAVIGATION -->
    <div id="prev" class="nav" onclick="prevImage()">❮</div>
    <div id="next" class="nav" onclick="nextImage()">❯</div>

    <!-- THUMBNAILS -->
    <div id="thumbnails"></div>

    <script>
        const images = [
            "https://picsum.photos/1200/800?1",
            "https://picsum.photos/1200/800?2",
            "https://picsum.photos/1200/800?3",
            "https://picsum.photos/1200/800?4",
            "https://picsum.photos/1200/800?5"
        ];

        let current = 0;

        const mainImage = document.getElementById("mainImage");
        const thumbnails = document.getElementById("thumbnails");

        function loadThumbnails() {
            images.forEach((img, index) => {
                const thumb = document.createElement("img");
                thumb.src = img;
                thumb.onclick = () => showImage(index);
                thumbnails.appendChild(thumb);
            });
        }

        function showImage(index) {
            current = index;
            mainImage.src = images[current];
        }

        function nextImage() {
            current = (current + 1) % images.length;
            showImage(current);
        }

        function prevImage() {
            current = (current - 1 + images.length) % images.length;
            showImage(current);
        }

        loadThumbnails();
    </script>

</body>
</html>
