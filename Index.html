<!DOCTYPE html>
<html>
<head>
    <title>Lens - AI Project</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- FULL CSS (converted from template) -->
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #main {
            height: 100%;
            width: 100%;
            position: relative;
        }

        #viewer {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        #viewer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease-in-out;
        }

        #header {
            position: absolute;
            top: 30px;
            left: 40px;
            color: white;
            z-index: 100;
        }

        #header h1 {
            font-size: 28px;
            margin: 0;
        }

        #header p {
            margin-top: 5px;
            color: #bbb;
        }

        #thumbnails {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            overflow-x: auto;
            background: rgba(0,0,0,0.7);
            padding: 10px;
        }

        #thumbnails img {
            height: 90px;
            margin-right: 10px;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
        }

        #thumbnails img:hover,
        #thumbnails img.active {
            opacity: 1;
        }

        .nav {
            position: absolute;
            top: 50%;
            font-size: 50px;
            color: white;
            cursor: pointer;
            user-select: none;
            z-index: 50;
        }

        #prev { left: 20px; }
        #next { right: 20px; }

    </style>
</head>

<body>

<div id="main">

    <!-- HEADER -->
    <div id="header">
        <h1>AI-Assisted Website</h1>
        <p>By Brian Menard</p>
    </div>

    <!-- VIEWER -->
    <div id="viewer">
        <img id="mainImage" src="">
    </div>

    <!-- NAV -->
    <div id="prev" class="nav">❮</div>
    <div id="next" class="nav">❯</div>

    <!-- THUMBNAILS -->
    <div id="thumbnails"></div>

</div>

<!-- FULL JAVASCRIPT (converted behavior) -->
<script>
    const images = [
        "https://picsum.photos/1400/900?1",
        "https://picsum.photos/1400/900?2",
        "https://picsum.photos/1400/900?3",
        "https://picsum.photos/1400/900?4",
        "https://picsum.photos/1400/900?5",
        "https://picsum.photos/1400/900?6"
    ];

    let current = 0;
    const mainImage = document.getElementById("mainImage");
    const thumbnails = document.getElementById("thumbnails");

    function preloadImages() {
        images.forEach(src => {
            const img = new Image();
            img.src = src;
        });
    }

    function renderThumbnails() {
        images.forEach((src, index) => {
            const img = document.createElement("img");
            img.src = src;

            img.onclick = () => {
                showImage(index);
            };

            thumbnails.appendChild(img);
        });
    }

    function showImage(index) {
        current = index;
        mainImage.style.opacity = 0;

        setTimeout(() => {
            mainImage.src = images[current];
            mainImage.style.opacity = 1;
            updateActive();
        }, 200);
    }

    function updateActive() {
        document.querySelectorAll("#thumbnails img").forEach((img, i) => {
            img.classList.toggle("active", i === current);
        });
    }

    function nextImage() {
        current = (current + 1) % images.length;
        showImage(current);
    }

    function prevImage() {
        current = (current - 1 + images.length) % images.length;
        showImage(current);
    }

    document.getElementById("next").onclick = nextImage;
    document.getElementById("prev").onclick = prevImage;

    // Keyboard controls (like original template)
    document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
    });

    preloadImages();
    renderThumbnails();
    showImage(0);
</script>

</body>
</html>
